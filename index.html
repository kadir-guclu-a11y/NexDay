<!-- NexDay Premium Website v2 -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
body{
  font-family:"Geist",-apple-system,BlinkMacSystemFont,sans-serif;
}

h1,h2,h3,.logo{
  font-family:"Geist",sans-serif;
}

/* MEHR PREMIUM MOTION */
.hero{
  position:relative;
  overflow:hidden;
}

.hero::before{
  content:"";
  position:absolute;
  width:900px;
  height:900px;
  right:-280px;
  top:-260px;
  background:conic-gradient(from 90deg,#ff8a00,#00e5ff,#8b5cf6,#ff8a00);
  filter:blur(140px);
  opacity:.42;
  animation:spinGlow 18s linear infinite;
  z-index:-2;
}

@keyframes spinGlow{
  to{transform:rotate(360deg)}
}

.badge{
  animation:badgeFloat 4s ease-in-out infinite;
}

@keyframes badgeFloat{
  50%{transform:translateY(-7px)}
}

h1 span{
  background:linear-gradient(90deg,#fff,#ffb86b,#62f4ff,#b794ff,#fff);
  background-size:260% auto;
  -webkit-background-clip:text;
  color:transparent;
  animation:textFlow 5s linear infinite;
}

@keyframes textFlow{
  to{background-position:260% center}
}

.phone{
  animation:phoneFloat 5.5s ease-in-out infinite;
}

@keyframes phoneFloat{
  50%{transform:translateY(-24px) rotateX(5deg) rotateY(-5deg) scale(1.025)}
}

.floating{
  animation:glassFloat 4.5s ease-in-out infinite;
}

@keyframes glassFloat{
  50%{transform:translateY(-18px) scale(1.04)}
}

/* PREMIUM FEATURE STRIP */
.premium-strip{
  margin-top:34px;
  display:flex;
  flex-wrap:wrap;
  gap:12px;
}

.pill{
  padding:13px 17px;
  border-radius:999px;
  background:rgba(255,255,255,.09);
  border:1px solid rgba(255,255,255,.14);
  color:#eaf4ff;
  font-weight:800;
  backdrop-filter:blur(22px);
}

/* NEXSHOP PRO SECTION */
.nexshop-pro{
  padding:110px 7vw;
}

.nexshop-card{
  position:relative;
  overflow:hidden;
  border-radius:56px;
  padding:70px;
  background:
    radial-gradient(circle at 18% 10%,rgba(255,138,0,.35),transparent 34%),
    radial-gradient(circle at 88% 78%,rgba(0,229,255,.28),transparent 38%),
    rgba(255,255,255,.07);
  border:1px solid rgba(255,255,255,.14);
  backdrop-filter:blur(34px);
  box-shadow:0 50px 140px rgba(0,0,0,.55);
}

.nexshop-card::after{
  content:"";
  position:absolute;
  inset:-2px;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.22),transparent);
  transform:translateX(-120%);
  animation:cardShine 7s ease-in-out infinite;
}

@keyframes cardShine{
  45%,100%{transform:translateX(120%)}
}

.nexshop-grid{
  display:grid;
  grid-template-columns:1.05fr .95fr;
  gap:60px;
  align-items:center;
  position:relative;
  z-index:2;
}

.nexshop-card h2{
  font-size:clamp(46px,6vw,88px);
  line-height:.92;
  letter-spacing:-4px;
  margin-bottom:22px;
}

.nexshop-card p{
  color:#c4cede;
  font-size:20px;
  line-height:1.65;
  max-width:720px;
}

.sync-list{
  display:grid;
  gap:14px;
  margin-top:30px;
}

.sync-item{
  padding:18px 20px;
  border-radius:24px;
  background:rgba(255,255,255,.09);
  border:1px solid rgba(255,255,255,.13);
  font-weight:850;
  display:flex;
  justify-content:space-between;
  gap:18px;
}

.sync-item span{
  color:#7ff7ff;
}

.invite-box{
  border-radius:42px;
  padding:28px;
  background:#05070d;
  border:1px solid rgba(255,255,255,.15);
  box-shadow:0 40px 110px rgba(0,0,0,.55);
}

.code{
  margin:20px 0;
  padding:24px;
  border-radius:26px;
  text-align:center;
  font-size:42px;
  letter-spacing:8px;
  font-weight:950;
  background:linear-gradient(135deg,rgba(255,138,0,.18),rgba(0,229,255,.18));
  border:1px solid rgba(255,255,255,.16);
  color:#fff;
}

.avatar-row{
  display:flex;
  margin-top:20px;
}

.avatar{
  width:48px;
  height:48px;
  border-radius:50%;
  display:grid;
  place-items:center;
  margin-right:-10px;
  background:linear-gradient(135deg,#ff8a00,#00e5ff);
  border:3px solid #05070d;
  font-weight:950;
}

.live-dot{
  display:inline-flex;
  align-items:center;
  gap:8px;
  color:#75ffcb;
  font-weight:900;
  margin-bottom:18px;
}

.live-dot::before{
  content:"";
  width:10px;
  height:10px;
  border-radius:50%;
  background:#75ffcb;
  box-shadow:0 0 22px #75ffcb;
  animation:blink 1.4s ease-in-out infinite;
}

@keyframes blink{
  50%{opacity:.35;transform:scale(.75)}
}

@media(max-width:900px){
  .nexshop-card{padding:38px}
  .nexshop-grid{grid-template-columns:1fr}
}
</style>

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexDay – Plan smarter. Live clearer.</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
background:#050505;
color:white;
overflow-x:hidden;
}
body:before{
content:"";
position:fixed;
inset:0;
z-index:-2;
background:
radial-gradient(circle at 20% 10%,#ff8a0030,transparent 28%),
radial-gradient(circle at 80% 20%,#00ffd530,transparent 30%),
radial-gradient(circle at 50% 90%,#7c3aed35,transparent 38%),
#050505;
}
body:after{
content:"";
position:fixed;
inset:0;
z-index:-1;
background-image:linear-gradient(#ffffff08 1px,transparent 1px),linear-gradient(90deg,#ffffff08 1px,transparent 1px);
background-size:48px 48px;
animation:gridMove 18s linear infinite;
mask-image:linear-gradient(to bottom,black,transparent 85%);
}

@keyframes gridMove{100%{transform:translateY(48px)}}

nav{
position:fixed;
top:18px;
left:50%;
transform:translateX(-50%);
width:92%;
max-width:1180px;
height:68px;
z-index:100;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 24px;
border-radius:999px;
background:#101014cc;
border:1px solid #ffffff18;
backdrop-filter:blur(24px);
box-shadow:0 20px 80px #0008;
transition:.4s;
}
nav:hover{
background:#101014f2;
border-color:#ffffff30;
transform:translateX(-50%) translateY(-2px);
}
.logo{
display:flex;
align-items:center;
gap:12px;
font-size:24px;
font-weight:900;
}
.logo-icon{
width:42px;
height:42px;
border-radius:14px;
display:grid;
place-items:center;
background:radial-gradient(circle,#ffb13d,#ff7a00 45%,#151515 80%);
box-shadow:0 0 28px #ff8a0066;
}
nav a{
color:#dbeafe;
text-decoration:none;
margin-left:22px;
font-weight:700;
font-size:14px;
}

.hero{
min-height:100vh;
padding:145px 8% 80px;
display:grid;
grid-template-columns:1.05fr .95fr;
align-items:center;
gap:70px;
perspective:1200px;
}
.badge{
display:inline-flex;
align-items:center;
gap:10px;
padding:11px 17px;
border-radius:999px;
background:#ffffff10;
border:1px solid #ffffff20;
color:#ffd08a;
font-weight:900;
margin-bottom:28px;
}
h1{
font-size:clamp(56px,8vw,112px);
line-height:.88;
letter-spacing:-6px;
margin-bottom:28px;
animation:titleFloat 5s ease-in-out infinite;
}
@keyframes titleFloat{50%{transform:translateY(-6px)}}
h1 span{
background:linear-gradient(90deg,#fff,#ffb84d,#3dffe0,#8b5cf6);
-webkit-background-clip:text;
color:transparent;
}
.hero p{
font-size:clamp(20px,2vw,27px);
line-height:1.45;
color:#cbd5e1;
max-width:690px;
margin-bottom:36px;
}

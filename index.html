<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NexDay — Plan smarter. Live clearer.</title>
<meta name="description" content="NexDay ist die All-in-One App für Aufgaben, Kalender, Einkauf, Meal Planner, Wetter, Timer und Kochmodus.">

<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
background:#030305;color:white;overflow-x:hidden;
}
a{text-decoration:none;color:inherit}

/* BACKGROUND */
body:before{
content:"";position:fixed;inset:0;z-index:-5;
background:
radial-gradient(circle at 15% 8%,rgba(255,132,0,.45),transparent 28%),
radial-gradient(circle at 85% 10%,rgba(0,229,255,.35),transparent 32%),
radial-gradient(circle at 50% 90%,rgba(139,92,246,.42),transparent 40%),
#030305;
}
body:after{
content:"";position:fixed;inset:0;z-index:-4;
background-image:
linear-gradient(rgba(255,255,255,.045) 1px,transparent 1px),
linear-gradient(90deg,rgba(255,255,255,.045) 1px,transparent 1px);
background-size:46px 46px;
mask-image:linear-gradient(to bottom,#000,transparent 86%);
animation:gridMove 24s linear infinite;
}
@keyframes gridMove{to{transform:translateY(46px)}}
.orb{
position:fixed;border-radius:50%;filter:blur(110px);opacity:.5;z-index:-3;
animation:orbMove 13s ease-in-out infinite alternate;
}
.o1{width:430px;height:430px;background:#ff8a00;top:-120px;left:-110px}
.o2{width:560px;height:560px;background:#00e5ff;top:40px;right:-200px;animation-delay:2s}
.o3{width:560px;height:560px;background:#8b5cf6;bottom:-210px;left:23%;animation-delay:4s}
@keyframes orbMove{to{transform:translate3d(50px,-40px,0) scale(1.18)}}

/* NAV */
nav{
position:fixed;top:18px;left:50%;transform:translateX(-50%);
width:min(1180px,calc(100% - 28px));height:68px;z-index:1000;
display:flex;align-items:center;justify-content:space-between;
padding:0 22px;border-radius:999px;
background:rgba(10,10,14,.68);
border:1px solid rgba(255,255,255,.14);
backdrop-filter:blur(30px);
box-shadow:0 24px 90px rgba(0,0,0,.5);
}
.logo{font-size:28px;font-weight:950;letter-spacing:-1.5px}
.logo span{
background:linear-gradient(90deg,#ff8a00,#00e5ff,#a78bfa);
-webkit-background-clip:text;color:transparent;
}
.navlinks{display:flex;align-items:center;gap:26px}
.navlinks a{font-size:14px;font-weight:800;color:#dce6f7;opacity:.88}
.nav-cta{
padding:13px 22px;border-radius:999px;font-weight:950;
background:linear-gradient(90deg,#ff8a00,#00d9ff);
box-shadow:0 0 35
